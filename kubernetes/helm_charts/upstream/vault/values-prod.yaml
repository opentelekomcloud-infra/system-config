# Vault configuration for OTC production environment (otcinfra2)
# Based on preprod configuration, adapted for production use
# Deployed on otcinfra2 cluster where ArgoCD resides
# Values are nested under vault: for the dependency chart

vault:
  global:
    enabled: true
    tlsDisable: false
    imagePullSecrets:
      - name: quay-pull-secret

  # Vault Agent Injector configuration
  injector:
    enabled: true
    replicas: 1

    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 256Mi
        cpu: 250m

    agentImage:
      repository: "hashicorp/vault"
      tag: "1.19.0"

    agentDefaults:
      cpuLimit: "250m"
      cpuRequest: "50m"
      memLimit: "128Mi"
      memRequest: "64Mi"
      template: "map"

  # Vault Server configuration
  server:
    enabled: true

    image:
      repository: "hashicorp/vault"
      tag: "1.19.0"
      pullPolicy: IfNotPresent

    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m

    # Ingress configuration for external access
    ingress:
      enabled: true
      ingressClassName: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        kubernetes.io/tls-acme: "true"
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        cert-manager.io/private-key-algorithm: RSA
        cert-manager.io/private-key-size: "4096"
        cert-manager.io/private-key-rotation-policy: Always
      hosts:
        - host: vault-k8s.eco.tsi-dev.otc-service.com
          paths:
            - /
      pathType: Prefix
      tls:
        - secretName: vault-tls-cert
          hosts:
            - vault-k8s.eco.tsi-dev.otc-service.com

      # Override the default service to use the main vault service instead of vault-active
      activeService: false

    # Service configuration
    service:
      enabled: true
      type: ClusterIP
      port: 8200
      targetPort: 8200
      annotations: {}

    # Enable Kubernetes auth method
    authDelegator:
      enabled: true

    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 1000
      fsGroup: 1000

    # Init containers to download plugins
    # Note: GitHub plugin (vault-plugin-secrets-github) can be added later
    # if dynamic GitHub token generation is needed (paths: github, github_otcbot, github_zuul)
    extraInitContainers:
      - name: install-openstack-plugin
        image: "quay.io/opentelekomcloud/vault-plugin-secrets-openstack:v1.4.0"
        command: [cp, /vault-plugin-secrets-openstack, /usr/local/libexec/vault/vault-plugin-secrets-openstack]
        volumeMounts:
          - name: plugins
            mountPath: /usr/local/libexec/vault

    # Extra sidecar container for auto-unseal
    extraContainers:
      - name: vault-unsealer
        image: "hashicorp/vault:1.19.0"
        command: ["sh", "-c"]
        args:
          - |
            echo "Vault unsealer sidecar started"
            while true; do
              sleep 10
              # Check seal status via local API (wget available in vault image)
              RESPONSE=$(wget --no-check-certificate -qO- https://127.0.0.1:8200/v1/sys/seal-status 2>/dev/null)
              if [ -z "$RESPONSE" ]; then
                echo "Vault not reachable yet, retrying..."
                continue
              fi
              # Check if sealed
              if echo "$RESPONSE" | grep -q '"sealed":true'; then
                echo "Vault is sealed, unsealing..."
                for i in 0 1 2; do
                  KEY=$(cat /vault/unseal-keys/vault-unseal-$i)
                  wget --no-check-certificate -qO- --post-data="{\"key\":\"$KEY\"}" \
                    --header="Content-Type: application/json" \
                    https://127.0.0.1:8200/v1/sys/unseal 2>/dev/null | grep -o '"sealed":[a-z]*'
                done
                echo "Unseal commands sent"
              fi
            done
        env:
          - name: VAULT_ADDR
            value: "https://127.0.0.1:8200"
          - name: VAULT_SKIP_VERIFY
            value: "true"
        volumeMounts:
          - name: vault-unseal-keys
            mountPath: /vault/unseal-keys
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 100
          runAsGroup: 1000
          readOnlyRootFilesystem: true

    # Extra volumes for plugins, unseal keys, and TLS certificates
    volumes:
      - name: plugins
        emptyDir: {}
      - name: vault-unseal-keys
        secret:
          secretName: vault-unseal-keys
      - name: vault-tls
        secret:
          secretName: vault-server-tls

    # Volume mounts for plugins and TLS
    volumeMounts:
      - mountPath: /usr/local/libexec/vault
        name: plugins
        readOnly: true
      - mountPath: /vault/tls
        name: vault-tls
        readOnly: true

    # Data storage configuration
    dataStorage:
      enabled: true
      size: 10Gi
      storageClass: "csi-disk-retain"
      accessMode: ReadWriteOnce

    # Audit storage configuration
    auditStorage:
      enabled: true
      size: 5Gi
      storageClass: "csi-disk-retain"
      accessMode: ReadWriteOnce

    # High Availability configuration
    ha:
      enabled: true
      replicas: 3

      # Integrated Raft storage for HA
      raft:
        enabled: true
        setNodeId: true

        config: |-
          # Plugin directory
          plugin_directory = "/usr/local/libexec/vault"

          listener "tcp" {
            tls_disable = 0
            address = "[::]:8200"
            cluster_address = "[::]:8201"
            tls_cert_file = "/vault/tls/tls.crt"
            tls_key_file = "/vault/tls/tls.key"
            tls_client_ca_file = "/vault/tls/ca.crt"
            # Enable unauthenticated metrics access (necessary for Prometheus Operator)
            telemetry {
              unauthenticated_metrics_access = "true"
            }
          }

          storage "raft" {
            path = "/vault/data"

            retry_join {
              leader_api_addr = "https://vault-otcinfra2-0.vault-otcinfra2-internal:8200"
              leader_ca_cert_file = "/vault/tls/ca.crt"
            }
            retry_join {
              leader_api_addr = "https://vault-otcinfra2-1.vault-otcinfra2-internal:8200"
              leader_ca_cert_file = "/vault/tls/ca.crt"
            }
            retry_join {
              leader_api_addr = "https://vault-otcinfra2-2.vault-otcinfra2-internal:8200"
              leader_ca_cert_file = "/vault/tls/ca.crt"
            }
          }

          # API and cluster addresses
          api_addr = "https://vault-otcinfra2.vault.svc.cluster.local:8200"
          cluster_addr = "http://POD_IP:8201"

          # Telemetry configuration for monitoring
          telemetry {
            prometheus_retention_time = "30s"
            disable_hostname = true
          }

          # Audit logging
          audit "file" {
            type = "file"
            path = "/vault/audit/audit.log"
          }

    # Additional environment variables (must be under server: for the chart to use them)
    extraEnvironmentVars:
      VAULT_ADDR: "https://127.0.0.1:8200"
      VAULT_API_ADDR: "https://vault-otcinfra2-active.vault.svc.cluster.local:8200"
      VAULT_CACERT: "/vault/tls/ca.crt"

    # Standalone configuration (disabled in favor of HA)
    standalone:
      enabled: false

  # UI configuration
  ui:
    enabled: false
    serviceType: "ClusterIP"

  # CSI Provider (for secret injection)
  csi:
    enabled: true

    image:
      repository: "hashicorp/vault-csi-provider"
      tag: "1.5.0"
      pullPolicy: IfNotPresent

    resources:
      requests:
        memory: 64Mi
        cpu: 50m
      limits:
        memory: 128Mi
        cpu: 100m

    volumeMountPath: "/vault/secrets"

  # Prometheus metrics
  serverTelemetry:
    prometheusOperator: true
