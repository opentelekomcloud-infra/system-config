apiVersion: v2
name: gitea
description: Gitea - A painless self-hosted Git service
type: application
version: 0.1.0
dependencies:
  - name: gitea
    version: "12.6.0"
    # The chart tgz is vendored locally in charts/gitea-12.6.0.tgz so that
    # ArgoCD can install without outbound internet access to dl.gitea.com.
    # Run `helm dependency update` to refresh it from the upstream registry.
    repository: "https://dl.gitea.com/charts/"
