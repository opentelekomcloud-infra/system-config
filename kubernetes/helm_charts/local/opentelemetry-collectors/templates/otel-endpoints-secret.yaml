{{- /*
  Secret containing OTel collector endpoint credentials.
  AVP resolves Vault paths at deploy time.
*/ -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: otel-endpoints
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  loki_url: {{ .Values.loki.url | quote }}
  loki_username: {{ .Values.loki.username | quote }}
  loki_password: {{ .Values.loki.password | quote }}
  loki_tenant_id: {{ .Values.loki.tenantId | quote }}
