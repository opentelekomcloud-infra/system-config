{{- /*
  OTel auto-instrumentation CR.
  Deployed once in the opentelemetry namespace.
  Applications opt-in via pod annotation, e.g.:
    instrumentation.opentelemetry.io/inject-python: "opentelemetry/otel-instrumentation"
    instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry/otel-instrumentation"
    instrumentation.opentelemetry.io/inject-java:   "opentelemetry/otel-instrumentation"
    instrumentation.opentelemetry.io/inject-go:     "opentelemetry/otel-instrumentation"
*/ -}}
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: otel-instrumentation
  namespace: {{ .Release.Namespace }}
spec:
  exporter:
    endpoint: http://otel-node-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  env:
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "cluster={{ .Values.clusterName }}"
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: grpc
  python:
    image: quay.io/opentelekomcloud/autoinstrumentation-python:0.51b0
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-node-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
  nodejs:
    image: quay.io/opentelekomcloud/autoinstrumentation-nodejs:0.57.1-amd64
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-node-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
  java:
    image: quay.io/opentelekomcloud/autoinstrumentation-java:2.12.0
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-node-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
  go:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-go:0.19.0-alpha
    env:
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-node-collector.{{ .Release.Namespace }}.svc.cluster.local:4317
