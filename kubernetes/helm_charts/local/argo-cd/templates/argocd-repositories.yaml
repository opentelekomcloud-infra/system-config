{{- if and .Values.repositorySecret (hasKey .Values.repositorySecret "enabled") .Values.repositorySecret.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    managed-by: argocd.argoproj.io
  labels:
    argocd.argoproj.io/secret-type: repository
  name: {{ .Values.repositorySecret.name }}
  namespace: {{ .Values.repositorySecret.namespace | default "argocd" }}
type: Opaque
data:
  name: {{ .Values.repositorySecret.data.name | quote }}
  project: {{ .Values.repositorySecret.data.project | quote }}
  type: {{ .Values.repositorySecret.data.type | quote }}
  url: {{ .Values.repositorySecret.data.url | quote }}
{{- end }}
{{- range .Values.repositorySecrets }}
{{- if .enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  annotations:
    managed-by: argocd.argoproj.io
  labels:
    argocd.argoproj.io/secret-type: repository
  name: {{ .name }}
  namespace: {{ .namespace | default "argocd" }}
type: Opaque
data:
  name: {{ .data.name | quote }}
  project: {{ .data.project | quote }}
  type: {{ .data.type | quote }}
  url: {{ .data.url | quote }}
  {{- if .data.username }}
  username: {{ .data.username | quote }}
  {{- end }}
  {{- if .data.password }}
  password: {{ .data.password | quote }}
  {{- end }}
  {{- if .data.githubAppID }}
  githubAppID: {{ .data.githubAppID | quote }}
  {{- end }}
  {{- if .data.githubAppInstallationID }}
  githubAppInstallationID: {{ .data.githubAppInstallationID | quote }}
  {{- end }}
  {{- if .data.githubAppPrivateKey }}
  githubAppPrivateKey: {{ .data.githubAppPrivateKey | quote }}
  {{- end }}
{{- end }}
{{- end }}
