clusterIssuers:
  - name: letsencrypt-prod
    email: <path:secret/data/smtp_gw#email_address>
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef: letsencrypt-prod-issuer-account-key
    solvers:
      - http01:
          ingress:
            # Use 'class' annotation instead of 'ingressClassName' field
            # to avoid nginx admission webhook rejecting ACME solver ingresses
            # with pathType Exact on /.well-known/acme-challenge paths
            class: nginx
  - name: letsencrypt-staging
    email: <path:secret/data/smtp_gw#email_address>
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef: letsencrypt-stg-issuer-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
