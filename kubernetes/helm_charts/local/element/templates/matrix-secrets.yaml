{{- /*
  Kubernetes Secrets for the Matrix Stack.
  Values are injected by ArgoCD Vault Plugin (AVP) from HashiCorp Vault.

  Vault paths:
    secret/postgres/matrix/admin  -> postgres-username, postgres-password
    secret/postgres/ca             -> cert (RDS CA certificate)
    secret/matrix/synapse          -> signing-key, registration-shared-secret,
                                      macaroon-secret-key, form-secret
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: matrix-secrets
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: synapse
type: Opaque
stringData:
  # -- Synapse signing key (full ed25519 key)
  signing-key: "<path:secret/data/matrix/synapse#signing-key>"

  # -- Registration shared secret
  registration-shared-secret: "<path:secret/data/matrix/synapse#registration-shared-secret>"

  # -- Macaroon secret key
  macaroon-secret-key: "<path:secret/data/matrix/synapse#macaroon-secret-key>"

  # -- Form secret
  form-secret: "<path:secret/data/matrix/synapse#form-secret>"
---
apiVersion: v1
kind: Secret
metadata:
  name: matrix-db-credentials
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # -- PostgreSQL password for synapse user (from RDS)
  password: "<path:secret/data/postgres/matrix/admin#postgres-password>"
---
apiVersion: v1
kind: Secret
metadata:
  name: matrix-db-ssl-ca-crt
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # -- RDS CA certificate for SSL connections
  ca.crt: "<path:secret/data/postgres/ca#cert>"
