# Swift Proxy for Zuul New Production Environment
# This values file configures swift-proxy with full Swift cluster in Kubernetes

# Deployment mode: "obs-only" (zuul-storage-proxy to OBS) or "cluster" (full Swift cluster)
mode: "cluster"

replicaCount: 1

# Proxy configuration
proxy:
  image:
    repository: quay.io/openstack.kolla/swift-proxy-server
    pullPolicy: IfNotPresent
    tag: "2024.1-ubuntu-jammy"
  port: 8080

# Storage nodes configuration (only used in cluster mode)
storage:
  enabled: true
  replicas: 1
  image:
    object:
      repository: quay.io/openstack.kolla/swift-object
      pullPolicy: IfNotPresent
      tag: "2024.1-ubuntu-jammy"
    container:
      repository: quay.io/openstack.kolla/swift-container
      pullPolicy: IfNotPresent
      tag: "2024.1-ubuntu-jammy"
    account:
      repository: quay.io/openstack.kolla/swift-account
      pullPolicy: IfNotPresent
      tag: "2024.1-ubuntu-jammy"
  persistence:
    enabled: true
    existingClaim: ""
    existingVolume: ""
    storageClass: "csi-disk-retain"
    accessMode: ReadWriteOnce
    size: 100Gi
    reclaimPolicy: Retain
    localStorage:
      enabled: false
      nodeName: ""
      path: ""
    sharedNFS:
      enabled: false
      server: ""
      path: ""
      mountOptions:
        - nolock
        - noresvport
        - noatime
        - nodiratime
        - rsize=1048576
        - wsize=1048576
        - timeo=600
        - retrans=2
        - hard
        - actimeo=120
  resources:
    limits:
      cpu: "2"
      memory: "4Gi"
    requests:
      cpu: "50m"
      memory: "512Mi"
  ports:
    object: 6200
    container: 6201
    account: 6202
    rsync: 873

serviceAccount:
  create: true
  name: "swift-proxy-zuul-new-prod"

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 42424

securityContext:
  allowPrivilegeEscalation: true
  capabilities:
    add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  name: http

resources:
  limits:
    cpu: "2"
    memory: "2Gi"
  requests:
    cpu: "75m"
    memory: "1Gi"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 70

# Swift configuration
swift:
  hashPathPrefix: "<path:secret/data/swift/config#hash_path_prefix>"
  hashPathSuffix: "<path:secret/data/swift/config#hash_path_suffix>"
  partitionPower: 14
  replicaFactor: 1
  minPartHours: 24

  # Keystone auth configuration
  keystoneAuth:
    authUrl: "<path:secret/data/zuul/logs/otc_technical_user#auth_url>"
    username: "<path:secret/data/zuul/logs/otc_technical_user#username>"
    password: "<path:secret/data/zuul/logs/otc_technical_user#password>"
    projectName: "<path:secret/data/zuul/logs/otc_technical_user#project_name>"
    userDomainName: "<path:secret/data/zuul/logs/otc_technical_user#user_domain_name>"
    regionName: "<path:secret/data/zuul/logs/otc_technical_user#region_name>"

  proxyPipeline:
    - catch_errors
    - gatekeeper
    - healthcheck
    - proxy-logging
    - cache
    - tempauth
    - container_sync
    - bulk
    - formpost
    - ratelimit
    - copy
    - container-quotas
    - account-quotas
    - slo
    - dlo
    - versioned_writes
    - symlink
    - staticweb
    - proxy-logging
    - proxy-server

  tempauth:
    enabled: true
    users:
      - account: admin
        username: <path:secret/data/loki#swift_user>
        password: <path:secret/data/loki#swift_password>
        groups: .admin
      # Zuul log uploads
      - account: zuul-prod-logs
        username: <path:secret/data/swift/users/zuul#username>
        password: <path:secret/data/swift/users/zuul#password>
        groups: .admin

# Legacy OBS-only configuration
cloudNames: "zuul-logs"

clouds: |
  zuul-logs:
    auth:
      auth_url: <path:secret/data/zuul/logs/otc_technical_user#auth_url>
      username: <path:secret/data/zuul/logs/otc_technical_user#username>
      password: <path:secret/data/zuul/logs/otc_technical_user#password>
      project_name: <path:secret/data/zuul/logs/otc_technical_user#project_name>
      user_domain_name: <path:secret/data/zuul/logs/otc_technical_user#user_domain_name>
    auth_type: password
    region_name: <path:secret/data/zuul/logs/otc_technical_user#region_name>
    interface: public
    object_store_endpoint_override: <path:secret/data/zuul/logs/otc_technical_user#object_store_endpoint>

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/duration: "8760h"
    cert-manager.io/renew-before: "720h"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  hosts:
    - host: swift-proxy.eco.tsi-dev.otc-service.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: swift-proxy-zuul-new-prod-tls
      hosts:
        - swift-proxy.eco.tsi-dev.otc-service.com

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - swift-proxy
              - key: app.kubernetes.io/instance
                operator: In
                values:
                  - zuul-new-prod
          topologyKey: kubernetes.io/hostname

# Readiness and liveness probes
probes:
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5

# URL Rewriter
urlRewriter:
  enabled: true
  replicaCount: 2
  image:
    repository: nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
