---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gitea-network-policy
  labels:
    {{- include "gitea-additional-manifests.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gitea
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow SSH from LoadBalancer
    - ports:
        - protocol: TCP
          port: 2222
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL (external DB)
    - to:
        - ipBlock:
            cidr: 192.168.170.86/32
      ports:
        - protocol: TCP
          port: 5432
    # Allow Valkey (same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # Allow OBS (S3) for LFS/attachments/packages
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Allow SMTP (external)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 465
    # Allow Zitadel OIDC (for token validation)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: zitadel
      ports:
        - protocol: TCP
          port: 8080
