apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.opensearch_security_config_secret_name }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "opensearch-additional.labels" . | nindent 4 }}
type: Opaque
stringData:
  internal_users.yml: {{ .Values.internal_users_yml | quote }}
  config.yml: {{ .Values.config_yml | quote }}
  roles.yml: {{ .Values.roles_yml | quote }}
  roles_mapping.yml: {{ .Values.roles_mapping_yml | quote }}
