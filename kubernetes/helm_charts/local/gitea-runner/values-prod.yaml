replicaCount: 1

image:
  repository: "gitea/act_runner"
  tag: "0.2.6"
  pullPolicy: IfNotPresent

gitea:
  instanceUrl: "https://gitea-k8s.eco.tsi-dev.otc-service.com"
  registrationToken: "<path:secret/data/gitea-k8s/gitea-runner#runner_registration_token>"

runner:
  name: "ubuntu-gitea-runner-01"
  labels: "ubuntu:docker://debian:bookworm,ubuntu-22.04:docker://debian:bookworm"
  capacity: 4
  logLevel: "info"

resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 100m
    memory: 512Mi

persistence:
  enabled: false
  storageClass: "csi-disk"
  accessMode: ReadWriteOnce
  size: 5Gi


podAnnotations:
  prometheus.io/scrape: "false"

podLabels:
  environment: "prod"
  component: "gitea-runner"

serviceAccount:
  create: true

dind:
  image:
    repository: "docker"
    tag: "24.0.7-dind"
    pullPolicy: IfNotPresent
  storageDriver: "overlay2"

securityContext:
  privileged: true
