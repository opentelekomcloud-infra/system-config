applications:
  # =====================================================
  #  Helm Chart Applications (argocd-vault-plugin-helm-with-args)
  # =====================================================
  - name: argocd-projects
    clusters: [otcinfra2]
    config:
      namespace: argocd-k8s
      repoURL: 'https://github.com/opentelekomcloud-infra/system-config.git'
      targetRevision: 'main'
      path: kubernetes/helm_charts/local/argocd
      pluginName: argocd-vault-plugin-helm-with-args
      pluginEnv: '-f values/prod/values-argocd-projects.yaml'
      project: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

  - name: argocd-clusters
    clusters: [otcinfra2]
    config:
      namespace: argocd-k8s
      repoURL: 'https://github.com/opentelekomcloud-infra/system-config.git'
      targetRevision: 'main'
      path: kubernetes/helm_charts/local/argocd
      pluginName: argocd-vault-plugin-helm-with-args
      pluginEnv: '-f values/prod/values-argocd-clusters.yaml'
      project: infra
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

  - name: argocd-repositories
