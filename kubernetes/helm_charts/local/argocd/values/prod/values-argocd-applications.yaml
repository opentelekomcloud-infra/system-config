      repoURL: 'https://github.com/opentelekomcloud-infra/system-config.git'
      targetRevision: 'main'
      path: kubernetes/helm_charts/upstream/argocd
      pluginName: argocd-vault-plugin-helm-with-args
      pluginEnv: '-f values-prod.yaml'
      project: infra
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

  - name: argocd-additional-manifests
