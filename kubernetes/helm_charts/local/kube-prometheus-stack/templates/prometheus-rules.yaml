{{- if .Values.prometheusRules.enabled }}
{{- /*
  Custom PrometheusRules for platform services not covered by
  the default kube-prometheus-stack alerting rules.
  Each group targets a specific service/component whose metrics
  are scraped in the cluster.
*/ -}}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alerts
  namespace: {{ .Release.Namespace }}
  labels:
    release: prometheus
spec:
  groups:
    # ── Blackbox / Endpoint Monitoring ──────────────────────────
    - name: blackbox-exporter
      rules:
        - alert: BlackboxProbeFailed
          expr: probe_success == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Endpoint {{`{{ $labels.instance }}`}} is down"
            description: "Blackbox probe against {{`{{ $labels.instance }}`}} has been failing for 5 minutes."

        - alert: BlackboxProbeHttpFailure
          expr: probe_http_status_code > 0 and (probe_http_status_code <= 199 or probe_http_status_code >= 400)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "HTTP failure on {{`{{ $labels.instance }}`}}"
            description: "Endpoint {{`{{ $labels.instance }}`}} returned HTTP {{`{{ $value }}`}}."

        - alert: BlackboxSslCertExpiringSoon
          expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 20
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "SSL cert for {{`{{ $labels.instance }}`}} expires in {{`{{ $value | humanize }}`}} days"
            description: "The SSL certificate on {{`{{ $labels.instance }}`}} will expire within 20 days."

        - alert: BlackboxSslCertExpiryCritical
          expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 3
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "SSL cert for {{`{{ $labels.instance }}`}} expires in {{`{{ $value | humanize }}`}} days"
            description: "The SSL certificate on {{`{{ $labels.instance }}`}} will expire within 3 days."

        - alert: BlackboxSlowProbe
          expr: avg_over_time(probe_duration_seconds[5m]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Slow probe on {{`{{ $labels.instance }}`}}"
            description: "Probe on {{`{{ $labels.instance }}`}} takes {{`{{ $value | humanize }}`}}s on average."

    # ── cert-manager ────────────────────────────────────────────
    - name: cert-manager
      rules:
        - alert: CertManagerCertNotReady
          expr: certmanager_certificate_ready_status{condition="True"} == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{`{{ $labels.namespace }}`}}/{{`{{ $labels.name }}`}} is not ready"
            description: "cert-manager certificate {{`{{ $labels.name }}`}} in namespace {{`{{ $labels.namespace }}`}} has been in not-ready state for 30 minutes."

        - alert: CertManagerCertExpirySoon
          expr: (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 14
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "cert-manager cert {{`{{ $labels.namespace }}`}}/{{`{{ $labels.name }}`}} expiring in {{`{{ $value | humanize }}`}} days"
            description: "Certificate {{`{{ $labels.name }}`}} in {{`{{ $labels.namespace }}`}} expires within 14 days. cert-manager may be failing to renew it."

    # ── PostgreSQL ──────────────────────────────────────────────
    - name: postgresql
      rules:
        - alert: PostgresDown
          expr: pg_up == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL instance {{`{{ $labels.instance }}`}} is down"
            description: "The postgres_exporter reports that PostgreSQL on {{`{{ $labels.instance }}`}} is unreachable."

        - alert: PostgresExporterDown
          expr: pg_exporter_last_scrape_error == 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL exporter scrape failing on {{`{{ $labels.instance }}`}}"
            description: "The postgres_exporter cannot scrape metrics from {{`{{ $labels.instance }}`}}."

        - alert: PostgresReplicationLagHigh
          expr: pg_replication_lag_seconds > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL replication lag is {{`{{ $value | humanize }}`}}s on {{`{{ $labels.instance }}`}}"
            description: "Replication lag on {{`{{ $labels.instance }}`}} has been above 30 seconds for 5 minutes."

        - alert: PostgresReplicationLagCritical
          expr: pg_replication_lag_seconds > 120
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PostgreSQL replication lag is {{`{{ $value | humanize }}`}}s on {{`{{ $labels.instance }}`}}"
            description: "Replication lag on {{`{{ $labels.instance }}`}} has been above 2 minutes for 5 minutes."

        - alert: PostgresTooManyLocks
          expr: pg_locks_count > 200
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High lock count ({{`{{ $value }}`}}) on {{`{{ $labels.instance }}`}}"
            description: "PostgreSQL instance {{`{{ $labels.instance }}`}} has {{`{{ $value }}`}} locks, which may indicate contention."

        - alert: PostgresTooManyConnections
          expr: >
            sum by (instance) (pg_stat_activity_count)
            /
            on (instance) pg_settings_max_connections
            > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "PostgreSQL connections at {{`{{ $value | humanizePercentage }}`}} on {{`{{ $labels.instance }}`}}"
            description: "{{`{{ $labels.instance }}`}} is using more than 85% of max_connections."

        - alert: PostgresDatabaseSizeCritical
          expr: pg_database_size_bytes > 10 * 1024 * 1024 * 1024
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Database {{`{{ $labels.datname }}`}} is {{`{{ $value | humanize1024 }}`}}B on {{`{{ $labels.instance }}`}}"
            description: "Database {{`{{ $labels.datname }}`}} has grown above 10 GiB."

        - alert: PostgresDeadlocks
          expr: increase(pg_stat_database_deadlocks[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deadlocks detected in database {{`{{ $labels.datname }}`}} on {{`{{ $labels.instance }}`}}"
            description: "PostgreSQL database {{`{{ $labels.datname }}`}} has experienced deadlocks in the last 5 minutes."

        - alert: PostgresLongRunningTransactions
          expr: pg_stat_activity_max_tx_duration > 300
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Long-running transaction on {{`{{ $labels.instance }}`}} ({{`{{ $value | humanize }}`}}s)"
            description: "A transaction has been running for more than 5 minutes on {{`{{ $labels.instance }}`}}."

    # ── ArgoCD ──────────────────────────────────────────────────
    - name: argocd
      rules:
        - alert: ArgoCDAppOutOfSync
          expr: argocd_app_info{sync_status!="Synced"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{`{{ $labels.name }}`}} is out of sync"
            description: "Application {{`{{ $labels.name }}`}} has been out of sync for 30 minutes (status: {{`{{ $labels.sync_status }}`}})."

        - alert: ArgoCDAppUnhealthy
          expr: argocd_app_info{health_status!~"Healthy|Progressing"} == 1
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD app {{`{{ $labels.name }}`}} is unhealthy"
            description: "Application {{`{{ $labels.name }}`}} has been in {{`{{ $labels.health_status }}`}} state for 30 minutes."

        - alert: ArgoCDSyncFailed
          expr: increase(argocd_app_sync_total{phase!="Succeeded"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ArgoCD sync failed for {{`{{ $labels.name }}`}}"
            description: "Application {{`{{ $labels.name }}`}} has had a failed sync in the last 15 minutes."

        - alert: ArgoCDClusterConnectionLost
          expr: argocd_cluster_connection_status == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "ArgoCD lost connection to cluster {{`{{ $labels.server }}`}}"
            description: "ArgoCD cannot reach the Kubernetes cluster at {{`{{ $labels.server }}`}}. No syncs will succeed until connectivity is restored."

    # ── PVC / Persistent Storage ────────────────────────────────
    - name: persistent-storage
      rules:
        - alert: PVCAlmostFull
          expr: >
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
            and kubelet_volume_stats_capacity_bytes > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{`{{ $labels.namespace }}`}}/{{`{{ $labels.persistentvolumeclaim }}`}} is {{`{{ $value | humanizePercentage }}`}} full"
            description: "Persistent volume claim {{`{{ $labels.persistentvolumeclaim }}`}} in {{`{{ $labels.namespace }}`}} has been above 85% utilization for 15 minutes."

        - alert: PVCCriticallyFull
          expr: >
            (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.95
            and kubelet_volume_stats_capacity_bytes > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{`{{ $labels.namespace }}`}}/{{`{{ $labels.persistentvolumeclaim }}`}} is {{`{{ $value | humanizePercentage }}`}} full"
            description: "Persistent volume claim {{`{{ $labels.persistentvolumeclaim }}`}} in {{`{{ $labels.namespace }}`}} is above 95% utilization."

    # ── Pod / Container Health ──────────────────────────────────
    - name: pod-health
      rules:
        - alert: PodOOMKilled
          expr: >
            increase(kube_pod_container_status_restarts_total[15m]) > 0
            and on (namespace, pod, container)
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "{{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} ({{`{{ $labels.container }}`}}) OOM killed"
            description: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.pod }}`}} was OOM killed and has restarted."

        - alert: HighPodRestartRate
          expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "{{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} restarting frequently"
            description: "Container {{`{{ $labels.container }}`}} in {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has restarted {{`{{ $value }}`}} times in the last hour."

    # ── Node Health ─────────────────────────────────────────────
    - name: node-health
      rules:
        - alert: NodeDiskPressure
          expr: >
            (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Disk {{`{{ $labels.mountpoint }}`}} on {{`{{ $labels.instance }}`}} is {{`{{ $value | humanizePercentage }}`}} full"
            description: "Filesystem on {{`{{ $labels.mountpoint }}`}} ({{`{{ $labels.device }}`}}) is above 85% utilization."

        - alert: NodeDiskCritical
          expr: >
            (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) > 0.95
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Disk {{`{{ $labels.mountpoint }}`}} on {{`{{ $labels.instance }}`}} is {{`{{ $value | humanizePercentage }}`}} full"
            description: "Filesystem on {{`{{ $labels.mountpoint }}`}} ({{`{{ $labels.device }}`}}) is critically full."

    # ── Tempo / Tracing ─────────────────────────────────────────
    - name: tempo
      rules:
        - alert: TempoDiscardedSpans
          expr: increase(tempo_discarded_spans_total[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Tempo is discarding spans ({{`{{ $labels.reason }}`}})"
            description: "Tempo has been discarding spans for reason {{`{{ $labels.reason }}`}} on {{`{{ $labels.instance }}`}}. Traces may be incomplete."

        - alert: TempoIngesterFlushFailing
          expr: increase(tempo_ingester_failed_flushes_total[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Tempo ingester flush failures on {{`{{ $labels.instance }}`}}"
            description: "Tempo ingester on {{`{{ $labels.instance }}`}} is failing to flush blocks to storage. Trace data may be lost."

        - alert: TempoIngesterHighLiveTraces
          expr: tempo_ingester_live_traces > 50000
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Tempo has {{`{{ $value }}`}} live traces on {{`{{ $labels.instance }}`}}"
            description: "High number of live traces in Tempo ingester may indicate memory pressure and lead to OOM."

    # ── Loki / Logging ──────────────────────────────────────────
    - name: loki
      rules:
        - alert: LokiRequestErrors
          expr: >
            100 * sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m])) by (namespace, job, route)
            /
            sum(rate(loki_request_duration_seconds_count[5m])) by (namespace, job, route)
            > 10
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Loki {{`{{ $labels.job }}`}} route {{`{{ $labels.route }}`}} has {{`{{ printf \"%.1f\" $value }}`}}% errors"
            description: "Loki route {{`{{ $labels.route }}`}} in {{`{{ $labels.namespace }}`}} is returning >10% server errors."

        - alert: LokiRequestPanics
          expr: increase(loki_panic_total[15m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Loki panic on {{`{{ $labels.instance }}`}}"
            description: "Loki instance {{`{{ $labels.instance }}`}} has experienced a panic. Check logs immediately."

        - alert: LokiCompactorFailing
          expr: increase(loki_boltdb_shipper_compact_tables_operation_total{status="failure"}[1h]) > 3
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Loki compactor failing on {{`{{ $labels.instance }}`}}"
            description: "Loki boltdb compactor has had multiple failures in the last hour. Log retention and index compaction may be affected."

    # ── Vault ───────────────────────────────────────────────────
    - name: vault
      rules:
        - alert: VaultDown
          expr: up{job=~".*vault.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Vault instance {{`{{ $labels.instance }}`}} is down"
            description: "Vault metrics endpoint on {{`{{ $labels.instance }}`}} is unreachable."

        - alert: VaultSealed
          expr: vault_core_unsealed == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Vault instance {{`{{ $labels.instance }}`}} is sealed"
            description: "Vault on {{`{{ $labels.instance }}`}} is sealed. Secrets cannot be read or written. Manual unseal or auto-unseal recovery is needed."

        - alert: VaultNotActive
          expr: vault_core_active == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Vault instance {{`{{ $labels.instance }}`}} is not active"
            description: "No Vault node is in active mode. The cluster may lack a leader."

        - alert: VaultAutopilotUnhealthy
          expr: vault_autopilot_healthy == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Vault Autopilot reports unhealthy cluster"
            description: "Vault Autopilot indicates the Raft cluster is not healthy. Check node status."

        - alert: VaultAutopilotNodeUnhealthy
          expr: vault_autopilot_node_healthy == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Vault node {{`{{ $labels.node_id }}`}} is unhealthy"
            description: "Vault Autopilot reports node {{`{{ $labels.node_id }}`}} as unhealthy. It may be partitioned or overloaded."

        - alert: VaultHighGoroutines
          expr: vault_runtime_num_goroutines > 1000
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Vault {{`{{ $labels.instance }}`}} has {{`{{ $value }}`}} goroutines"
            description: "High goroutine count on Vault may indicate a leak or excessive concurrent requests."

    # ── Zitadel / Identity ──────────────────────────────────────
    - name: zitadel
      rules:
        - alert: ZitadelDown
          expr: up{job=~".*zitadel.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Zitadel instance {{`{{ $labels.instance }}`}} is down"
            description: "Zitadel metrics endpoint on {{`{{ $labels.instance }}`}} is unreachable. SSO/authentication will be impacted."

        - alert: ZitadelHighErrorRate
          expr: >
            sum(rate(grpc_server_grpc_status_code_total{return_code=~"500|503|13|14"}[5m])) by (instance)
            /
            sum(rate(grpc_server_grpc_status_code_total[5m])) by (instance)
            > 0.05
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Zitadel gRPC error rate is {{`{{ $value | humanizePercentage }}`}} on {{`{{ $labels.instance }}`}}"
            description: "Zitadel is returning >5% server errors on gRPC calls. Authentication may be degraded."

        - alert: ZitadelSlowResponses
          expr: >
            histogram_quantile(0.95, sum(rate(http_server_duration_milliseconds_bucket{job=~".*zitadel.*"}[5m])) by (le, instance))
            > 2000
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Zitadel p95 latency is {{`{{ $value | humanize }}`}}ms on {{`{{ $labels.instance }}`}}"
            description: "Zitadel HTTP p95 latency exceeds 2 seconds. Users may experience slow login."

    # ── Anubis / Outline Protection ─────────────────────────────
    - name: anubis
      rules:
        - alert: AnubisDown
          expr: up{job=~".*anubis.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Anubis (Outline proxy) is down on {{`{{ $labels.instance }}`}}"
            description: "The Anubis challenge proxy protecting Outline is unreachable."

        - alert: AnubisHighDenyRate
          expr: >
            sum(rate(anubis_policy_results{action="DENY"}[10m]))
            /
            sum(rate(anubis_policy_results[10m]))
            > 0.3
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Anubis is denying >30% of requests"
            description: "Anubis bot protection is blocking a high proportion of traffic. This may indicate an attack or misconfigured rules affecting legitimate users."

        - alert: AnubisHighChallengeRate
          expr: >
            sum(rate(anubis_policy_results{action="CHALLENGE"}[10m]))
            /
            sum(rate(anubis_policy_results[10m]))
            > 0.8
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Anubis is challenging >80% of requests"
            description: "Most visitors to Outline are being challenged. Possible bot flood or overly aggressive policy."
{{- end }}
