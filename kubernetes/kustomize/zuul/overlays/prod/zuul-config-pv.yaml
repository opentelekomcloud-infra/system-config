---
# Patch PV for Zuul config shared storage - override NFS server for new-prod
# TODO: Update NFS server IP when new-prod SFS Turbo is provisioned
apiVersion: v1
kind: PersistentVolume
metadata:
  name: zuul-config-sfs-turbo
spec:
  mountOptions:
    - vers=3
    - nolock
    - noresvport
    - noatime
    - nodiratime
    - rsize=1048576
    - wsize=1048576
    - timeo=600
    - retrans=2
    - hard
    - actimeo=120
  nfs:
    path: /
    server: PLACEHOLDER_SFS_TURBO_IP  # TODO: Replace with actual SFS Turbo NFS server IP
