# Production tenant configuration for Zuul (prod)
# Mirrored from old prod (zuul-config/zuul/tenants/eco/sources/) on 2026-05-14

# Operator admin authorization rules (keycloak `zuul` client roles).
# Referenced by the eco2 tenant admin-rules below and satisfied by the
# [auth "keycloak"] OpenIDConnect authenticator in zuul.conf.
- authorization-rule:
    name: admin
    conditions:
      - resource_access.zuul.roles: admin

- authorization-rule:
    name: eco_admin
    conditions:
      - resource_access.zuul.roles: eco_admin

- tenant:
    name: eco2
    max-nodes-per-job: 5
    exclude-unprotected-branches: true
    report-build-page: true
    admin-rules:
      - admin
      - eco_admin
    source:
      github:
        config-projects:
          - opentelekomcloud-infra/zuul-infra:
              include:
                - job
                - semaphore
                - project
                - project-template
                - pipeline
                - nodeset
                - secret
              load-branch: Migration_of_zuul_to_prod
        untrusted-projects:
          - opentelekomcloud-infra/system-config:
              include:
                - project
              shadow: opentelekomcloud-infra/system-config
          - opentelekomcloud/LoveOTC:
