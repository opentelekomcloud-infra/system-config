---
# Nodepool configuration for Zuul prod environment

elements-dir: /etc/nodepool/elements
images-dir: /opt/nodepool/images

zookeeper-servers:
  - host: zookeeper.zuul.svc.cluster.local
    port: 2281

zookeeper-tls:
  cert: /tls/client/tls.crt
  key: /tls/client/tls.key
  ca: /tls/client/ca.crt

labels:
  - name: debian
    min-ready: 0
    max-ready-age: 3600

  - name: zuul-debian
    min-ready: 0

providers:
  # Kubernetes provider for pod-based nodes (in-cluster)
  - name: prod-k8s
    driver: kubernetes
    max-servers: 5
    context: prod
    pools:
      - name: default
        labels:
          - name: zuul-debian
            type: pod
            spec:
              imagePullSecrets:
                - name: quay-image-pull-secret
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
              volumes:
                - name: zuul-ssh-keys
                  secret:
                    secretName: zuul-ssh-keys
                    defaultMode: 0600
                - name: zuul-home
                  emptyDir: {}
              containers:
                - name: zuul-debian
                  image: quay.io/opentelekomcloud/python-tox:latest
                  imagePullPolicy: Always
                  command: ["/bin/sh", "-c"]
                  args: ["sleep infinity"]
                  env:
                    - name: HOME
                      value: /home/zuul
                    - name: USER
                      value: zuul
                  volumeMounts:
                    - name: zuul-ssh-keys
                      mountPath: /etc/zuul-ssh-keys
                      readOnly: true
                    - name: zuul-home
                      mountPath: /home/zuul
                  resources:
                    requests:
                      cpu: "1"
                      memory: "1024Mi"
                    limits:
                      cpu: "1"
                      memory: "1024Mi"
            python-path: /usr/bin/python3
            shell-type: /bin/bash
            context: prod

diskimages:
  - name: debian-bookworm
