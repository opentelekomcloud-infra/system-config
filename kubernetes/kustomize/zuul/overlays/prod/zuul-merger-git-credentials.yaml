---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zuul-merger-ssh-config
data:
  config: |
    Host github.com
        User git
        IdentityFile /var/lib/zuul-ssh/github.key
        StrictHostKeyChecking yes
        UserKnownHostsFile /var/lib/zuul/.ssh/known_hosts

    Host gitlab.com
        User git
        IdentityFile /var/lib/zuul-ssh/gitlab.key
        StrictHostKeyChecking yes
        UserKnownHostsFile /var/lib/zuul/.ssh/known_hosts

    Host gitea-k8s.eco.tsi-dev.otc-service.com
        Port 2222
        User git
        IdentityFile /var/lib/zuul-ssh/gitea.key
        StrictHostKeyChecking yes
        UserKnownHostsFile /var/lib/zuul/.ssh/known_hosts
