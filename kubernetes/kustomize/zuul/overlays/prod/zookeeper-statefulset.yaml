---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zookeeper
spec:
  replicas: 3
  template:
    spec:
      containers:
      - name: zookeeper
        env:
        - name: ZK_TICK_TIME
          value: "3000"
        - name: ZK_MIN_SESSION_TIMEOUT
          value: "20000"
        - name: ZK_MAX_SESSION_TIMEOUT
          value: "180000"
        - name: ZK_MAX_CLIENT_CNXNS
          value: "120"
        - name: ZK_SYNC_LIMIT
          value: "10"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: csi-disk-topology
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
