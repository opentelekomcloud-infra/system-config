---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zuul-executor
spec:
  replicas: 1
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: "opentelemetry/otel-instrumentation"
  volumeClaimTemplates:
    - metadata:
        name: zuul-var
      spec:
        storageClassName: csi-disk-retain
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
