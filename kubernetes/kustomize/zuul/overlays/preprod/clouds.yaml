---
# Nodepool openstacksdk configuration for preprod environment
# Using ArgoCD Vault Plugin syntax
cache:
  expiration:
    server: 5
    port: 5
    floating-ip: 5
clouds:
  zuul-logs:
    # Swift cluster for log storage via Swift tempauth
    auth_type: v1password
    auth:
      auth_url: https://swift-proxy.eco-preprod.tsi-dev.otc-service.com/auth/v1.0
      username: "zuul-preprod-logs:<path:secret/data/swift/users/zuul#username>"
      password: "<path:secret/data/swift/users/zuul#password>"
    object_store_endpoint_override: https://swift-proxy.eco-preprod.tsi-dev.otc-service.com/v1/AUTH_zuul-preprod-logs
    region_name: eu-de
