apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    general_settings:
      control_plane_url: "https://litellm.eco-preprod.tsi-dev.otc-service.com"

    litellm_settings:
      num_retries: 4
      request_timeout: 6000
      callbacks: ["prometheus"]
      require_auth_for_metrics_endpoint: true

    router_settings:
      routing_strategy: least-busy
      num_retries: 4
      timeout: 6000

      allowed_fails: 4
      cooldown_time: 30
