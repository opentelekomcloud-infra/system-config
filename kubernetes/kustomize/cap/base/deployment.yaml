---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cap
  labels:
    app: cap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cap
  template:
    metadata:
      labels:
        app: cap
    spec:
      serviceAccountName: cap
      terminationGracePeriodSeconds: 10
      containers:
      - name: cap
        image: quay.io/opentelekomcloud/cap:2.2.1
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
