---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cap

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: "preprod"
      app.kubernetes.io/managed-by: "argocd"
      environment: "preprod"

resources:
  - ../../base
  - namespace.yaml

patchesStrategicMerge:
  - deployment-patch.yaml
  - ingress-patch.yaml

secretGenerator:
  - name: cap-credentials
    literals:
      - ADMIN_KEY=<path:secret/data/cap/server#admin-key>

images:
  - name: "tiago2/cap"
    newTag: "2.2.1"
