---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cap

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: "preprod"
      app.kubernetes.io/managed-by: "argocd"
      environment: "preprod"

resources:
  - ../../base
  - namespace.yaml

components:
  - ../../resources/valkey

patches:
  - path: deployment-patch.yaml
  - path: ingress-patch.yaml
  - path: valkey-patch.yaml

configMapGenerator:
  - name: cap-config
    literals:
      - SERVER_PORT=3000
      - SERVER_HOSTNAME=0.0.0.0
      - DEMO_MODE=false
      - SHOW_ERRORS=true
      - DISABLE_ERROR_LOGGING=false

secretGenerator:
  - name: cap-credentials
    literals:
      - ADMIN_KEY=<path:secret/data/cap/server#admin-key>

  - name: valkey-auth
    literals:
      - VALKEY_PASSWORD=<path:secret/data/cap/valkey#valkey-password>

images:
  - name: swr.eu-de.otc.t-systems.com/opentelekomcloud/cap
    newTag: "3.0.7"
