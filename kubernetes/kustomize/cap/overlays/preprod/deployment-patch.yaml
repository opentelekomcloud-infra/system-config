---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cap
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cap
          securityContext:
            allowPrivilegeEscalation: false
           readOnlyRootFilesystem: true
          volumes:
            - name: tmp
              emptyDir: {}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: cap-credentials
            - configMapRef:
                name: cap-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cap
                topologyKey: kubernetes.io/hostname
