---
# Production deploy catalogue for the new k8s-only prod (otcinfra2 / tenant eco2)
#
# === DESIGN ===
# - No bridge host. Zuul executor runs ansible directly against the OTC API
#   (CCE / VPC / ELB / OBS) using `community.opentelekomcloud.*` and
#   `openstack.cloud.*` modules with `delegate_to: localhost`.
# - All in-cluster services (vault, gitea, zuul, grafana, loki, postgres, swift,
#   zitadel, anubis, outline, mcaptcha, kube-prometheus-stack, opentelemetry,
#   victoria-metrics, cert-manager, kubernetes-replicator, ...) are managed by
#   ArgoCD from `kubernetes/helm_charts/local/argo-cd/values/<env>/`. They MUST
#   NOT have a Zuul deploy job.
# - Keycloak is dropped (replaced by Zitadel which is ArgoCD-managed).
# - Gitea-sync, grafana-dashboards, grafana-datasources are dropped (handled
#   by upstream/grafana app + new IdP/migration approach).
#
# === WHAT REMAINS ===
# 1. Cluster-bootstrap jobs that ArgoCD cannot do for itself
#    (CCE cluster create/update, OTC LoadBalancer + LB cert).
# 2. Propose-update jobs (open PRs to bump image tags).
# 3. Catch-all parents for future ad-hoc OTC-API playbooks.
#
# === SECRETS ===
# Defined separately in zuul-infra/zuul.d/secrets.yaml:
#   - otc_clouds_yaml         -> /home/zuul/.config/openstack/clouds.yaml
#   - eco2_vault_approle      -> role_id + secret_id for vault-otcinfra2
#   - github_propose_token    -> bot PAT for opening PRs
# These are pulled in via the new `infra-prod-base-k8s` parent below.

# Make sure only one run of a system-config playbook happens at a time
- semaphore:
    name: infra-prod-playbook
    max: 1

# ---------------------------------------------------------------------------
# Parent: ansible runs locally on the executor, no SSH, no bridge.
# ---------------------------------------------------------------------------
- job:
    name: infra-prod-playbook
    parent: base
    description: |
      Run the specified system-config playbook from the Zuul executor
      directly against the OTC API (no bridge host).

      Set `playbook_name` (relative to system-config/playbooks) to choose
      which playbook to execute.
    abstract: true
    semaphore: infra-prod-playbook
    run: playbooks/zuul/run-production-playbook-k8s.yaml
    post-run: playbooks/zuul/run-production-playbook-post.yaml
    required-projects:
      - opentelekomcloud-infra/system-config
    nodeset:
      nodes: []          # executor-only, no node assignment
    vars:
      infra_prod_ansible_forks: 10
      infra_prod_playbook_collect_log: true
      infra_prod_playbook_encrypt_log: true
    secrets:
      - name: otc_clouds_yaml
        secret: otc_clouds_yaml
      - name: eco2_vault_approle
        secret: eco2_vault_approle

# ---------------------------------------------------------------------------
# Cluster bootstrap (must come from outside the cluster -> Zuul, not ArgoCD)
# ---------------------------------------------------------------------------
- job:
    name: infra-prod-install-cce
    parent: infra-prod-playbook
    description: Create / update OTC CCE clusters from declarative inventory
    vars:
      playbook_name: cloud-cce.yaml
    files:
      - inventory/service/group_vars/cloud-launcher.yaml
      - playbooks/cloud-cce.yaml
      - playbooks/roles/cloud_cce/

- job:
    name: infra-prod-install-loadbalancer
    parent: infra-prod-playbook
    description: Create / update OTC ELB load balancers and their certs
    vars:
      playbook_name: cloud-loadbalancer.yaml
    files:
      - inventory/service/group_vars/cloud-launcher.yaml
      - playbooks/cloud-loadbalancer.yaml
      - playbooks/roles/cloud_loadbalancer/
      - playbooks/roles/cloud_loadbalancer_cert/

# ---------------------------------------------------------------------------
# Propose update jobs (open PRs to bump image tags / inventory values)
# Pure git operations -- only need a github token, no infra access.
# ---------------------------------------------------------------------------
- job:
    name: infra-prod-propose-update
    parent: base
    description: Open a PR proposing an inventory / image-tag bump
    abstract: true
    run: playbooks/zuul/propose-update.yaml
    required-projects:
      - opentelekomcloud-infra/system-config
    nodeset:
      nodes: []
    secrets:
      - name: github_propose_token
        secret: github_propose_token
    vars:
      extra_job_vars:
        propose_key: "{{ propose_key }}"
        propose_value: "{{ value }}"

- job:
    name: infra-prod-propose-octavia-proxy-image-stable
    parent: infra-prod-propose-update
    description: Propose new Octavia-proxy image (stable channel)
    vars:
      propose_key: "octavia_proxy_image_stable"

- job:
    name: infra-prod-propose-octavia-proxy-image-latest
    parent: infra-prod-propose-update
    description: Propose new Octavia-proxy image (latest channel)
    vars:
      propose_key: "octavia_proxy_image_latest"
