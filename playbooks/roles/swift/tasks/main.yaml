---
- name: Install system packages
  ansible.builtin.package:
    name: "{{ item }}"
    state: "present"
  loop: "{{ packages }}"

- name: Install additional python packages using pip
  ansible.builtin.pip:
    name: "{{ item }}"
    virtualenv: "/usr/local/swift"
  loop: "{{ python_packages }}"

# --- ES-795: emergency identity-header-spoofing patch --------------------
# The published validatetoken middleware does not strip client-supplied
# identity headers, letting an unauthenticated caller spoof
# "X-Identity-Status: Confirmed" / "X-Roles: ResellerAdmin" and bypass auth
# (partial OTC compromise). Until a fixed release is published on PyPI and
# the pin in defaults/main.yaml is bumped, overwrite the middleware that pip
# installed into the swift venv with the patched copy shipped in this role.
# TODO(ES-795): remove these two tasks + files/validatetoken/ once the pin
# points at a fixed validatetoken release.
- name: Locate installed validatetoken middleware in the swift venv
  ansible.builtin.find:
    paths: "/usr/local/swift/lib"
    patterns: "validatetoken.py"
    recurse: true
    file_type: "file"
  register: swift_validatetoken_files

- name: Apply ES-795 identity-header-spoofing patch to validatetoken
  ansible.builtin.copy:
    src: "validatetoken/middleware/validatetoken.py"
    dest: "{{ item.path }}"
    owner: "root"
    group: "swift"
    mode: "0644"
  loop: "{{ swift_validatetoken_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  notify:
    - Reload swift-proxy
# -------------------------------------------------------------------------

- name: Create swift group
  ansible.builtin.group:
    name: "swift"

- name: Create swift user
  ansible.builtin.user:
    name: "swift"
    group: "swift"
    home: "/var/lib/swift"
    shell: "/bin/false"

- include_tasks: storage.yaml
  when: "swift_drives | length > 0"

- name: Make directories
  ansible.builtin.file:
    dest: "/etc/swift"
    state: "directory"
    owner: "swift"
    group: "swift"

- name: Write proxy-server.conf
  ansible.builtin.template:
    dest: "/etc/swift/proxy-server.conf"
    src: "proxy-server.conf.j2"

- name: Write swift.conf
  ansible.builtin.template:
    dest: "/etc/swift/swift.conf"
    src: "swift.conf.j2"

- name: Create recon/cache directory
  ansible.builtin.file:
    state: "directory"
    dest: "/var/cache/swift"
    owner: "root"
    group: "swift"
    mode: 0775

- name: Create config directories
  ansible.builtin.file:
    dest: "{{ item.dest }}"
    state: "directory"
    group: "swift"
    owner: "swift"
  loop:
    - dest: "/etc/swift/account-server"
    - dest: "/etc/swift/container-server"
    - dest: "/etc/swift/object-server"

- name: Drop old Swift config files
  ansible.builtin.file:
    dest: "{{ item }}"
    state: "absent"
  loop:
    - "/etc/swift/account-server.conf"
    - "/etc/swift/container-server.conf"
    - "/etc/swift/object-server.conf"

- name: Write new main Swift config files
  ansible.builtin.template:
    dest: "{{ item.dest }}"
    src: "{{ item.src }}"
    owner: "swift"
    group: "swift"
  loop:
    - src: "account-server-1.conf.j2"
      dest: "/etc/swift/account-server/1.conf"
    - src: "account-server-2.conf.j2"
      dest: "/etc/swift/account-server/2.conf"
      repl: true
    - src: "container-server-1.conf.j2"
      dest: "/etc/swift/container-server/1.conf"
    - src: "container-server-2.conf.j2"
      dest: "/etc/swift/container-server/2.conf"
      repl: true
    - src: "object-server-1.conf.j2"
      dest: "/etc/swift/object-server/1.conf"
    - src: "object-server-2.conf.j2"
      dest: "/etc/swift/object-server/2.conf"
      repl: true
    - src: "internal-client.conf.j2"
      dest: "/etc/swift/internal-client.conf"
  when: "item.repl is not defined or (item.repl and swift_replication_ip is defined)"

- name: Write swift rsyslog conf
  ansible.builtin.template:
    dest: "/etc/rsyslog.d/10-swift.conf"
    src: "rsyslog.swift.conf.j2"
  notify:
    - Restart rsyslog
