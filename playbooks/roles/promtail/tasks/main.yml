---
- name: Include variables
  include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files: "{{ distro_lookup_path }}"
      paths:
        - "vars"

- name: Remove conflicting Ubuntu Docker packages
  become: true
  ansible.builtin.package:
    state: absent
    name: "{{ item }}"
  loop:
    - "{{ remove_packages }}"
  when: "ansible_facts.pkg_mgr != 'atomic_container'"
  register: task_result
  until: task_result is success
  retries: 5

- name: Install required packages
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ item }}"
  loop:
    - "{{ packages }}"
  when: "ansible_facts.pkg_mgr != 'atomic_container'"
  register: task_result
  until: task_result is success
  retries: 5

- name: Stop Docker service and socket to clear locks
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - docker.service
    - docker.socket
  failed_when: false

- name: Remove stale Docker socket and PID files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/run/docker.sock
    - /var/run/docker.pid

- name: Ensure containerd is running and enabled
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true

- name: Start and enable Docker socket and daemon
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - docker.socket
    - docker.service

- name: Create required directories
  become: true
  file:
    path: "{{ item.dest }}"
    state: directory
    recurse: yes
    owner: root
    group: root
    mode: "{{ item.mode | default(omit) }}"
  loop:
    - {dest: "/etc/promtail"}

- name: Write promtail config files
  become: true
  template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: 0660
  loop:
    - {src: "config.yml.j2", dest: "/etc/promtail/config.yml"}
  notify:
    - restart promtail

- name: Write promtail Systemd unit file
  become: true
  template:
    src: "promtail.service.j2"
    dest: "{{ promtail_systemd_unit_path }}"
  notify:
    - restart promtail
