---
- name: Include variables
  include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files: "{{ distro_lookup_path }}"
      paths:
        - "vars"

- name: Remove conflicting Ubuntu Docker packages
  become: true
  ansible.builtin.package:
    state: absent
    name: "{{ item }}"
  loop:
    - "{{ remove_packages }}"
  when: "ansible_facts.pkg_mgr != 'atomic_container'"
  register: task_result
  until: task_result is success
  retries: 5

- name: Install required packages
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ item }}"
  loop:
    - "{{ packages }}"
  when: "ansible_facts.pkg_mgr != 'atomic_container'"
  register: task_result
  until: task_result is success
  retries: 5

- name: Stop Docker service and socket to clear locks
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - docker.service
    - docker.socket
  failed_when: false

- name: Remove stale Docker socket and PID files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/run/docker.sock
    - /var/run/docker.pid

- name: Ensure containerd is running and enabled
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true

- name: Start and enable Docker socket and daemon
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - docker.socket
    - docker.service

- name: Make sure Telegraf Conf dir exists
  become: true
  file:
    path: "/etc/telegraf"
    state: directory
    recurse: yes

- name: Write Telegraf Conf
  become: true
  template:
    src: "telegraf.conf.j2"
    dest: "/etc/telegraf/telegraf.conf"
  notify:
    - restart telegraf

- name: Write telegraf systemd unit file
  become: true
  template:
    src: "telegraf.service.j2"
    dest: "{{ telegraf_systemd_unit_path }}"
  notify:
    - restart telegraf
