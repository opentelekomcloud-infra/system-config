---
- name: Include variables
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files: "{{ distro_lookup_path }}"
      paths:
        - "vars"

- name: Remove conflicting Ubuntu Docker packages
  become: true
  ansible.builtin.package:
    state: absent
    name: "{{ remove_packages }}"
  when: "ansible_facts.pkg_mgr != 'atomic_container'"
  register: remove_result
  until: remove_result is success
  retries: 5

- name: Install required packages
  become: true
  ansible.builtin.package:
    state: present
    name: "{{ packages }}"
  when: "ansible_facts.pkg_mgr != 'atomic_container'"
  register: install_result
  until: install_result is success
  retries: 5

- name: Clean up stale sockets after package changes
  become: true
  block:
    - name: Stop Docker service and socket
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - docker.service
        - docker.socket
      failed_when: false

    - name: Remove stale Docker socket and PID files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/run/docker.sock
        - /var/run/docker.pid
  when: remove_result is changed or install_result is changed

- name: Clear systemd rate-limits and prepare containerd
  become: true
  block:
    - name: Reset systemd failed state for Docker units
      ansible.builtin.systemd:
        name: "{{ item }}"
        reset_failed: true
      loop:
        - docker.socket
        - docker.service
      failed_when: false

    - name: Ensure containerd service is started and enabled
      ansible.builtin.systemd:
        name: containerd
        state: started
        enabled: true

- name: Start and enable Docker socket and daemon
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - docker.socket
    - docker.service

- name: Make sure Telegraf Conf dir exists
  become: true
  ansible.builtin.file:
    path: "/etc/telegraf"
    state: directory
    mode: '0755'

- name: Write Telegraf Conf
  become: true
  ansible.builtin.template:
    src: "telegraf.conf.j2"
    dest: "/etc/telegraf/telegraf.conf"
    mode: '0644'
  notify:
    - restart telegraf

- name: Write telegraf systemd unit file
  become: true
  ansible.builtin.template:
    src: "telegraf.service.j2"
    dest: "{{ telegraf_systemd_unit_path }}"
    mode: '0644'
  notify:
    - restart telegraf