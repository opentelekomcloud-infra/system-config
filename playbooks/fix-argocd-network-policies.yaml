---
# Remediation: ArgoCD (otcinfra2 / argocd-k8s) cluster-wide sync outage.
#
# Root cause
#   The argo-cd chart 10.1.x defaults `global.networkPolicy.create: true` and
#   generates per-component NetworkPolicies whose ingress allow-rules reference
#   *named* ports (redis, repo-server). This cluster's CNI does not admit
#   named-port NetworkPolicy rules, so the application-controller and server are
#   silently blocked from reaching redis and the repo-server gRPC endpoint
#   (`rpc error ... dial tcp <repo-server>:8081: i/o timeout`). Every ArgoCD
#   Application ends up stuck in ComparisonError.
#
# Permanent fix (Git / GitOps)
#   `argo-cd.global.networkPolicy.create: false` in
#   kubernetes/helm_charts/upstream/argocd/values-prod.yaml
#
# Why this playbook is needed
#   ArgoCD cannot self-heal the fix on its own: the application-controller is
#   blocked from the very repo-server that would render the corrected manifests
#   (a deadlock). This playbook breaks the deadlock by removing the offending
#   NetworkPolicies so the controller can reach the repo-server again; it then
#   renders from Git (which no longer creates the policies) and they stay gone.
#   It also cleans up the stale (Evicted / Init:ContainerStatusUnknown)
#   argocd-server pods left behind by an earlier node-eviction event.
#
# Usage
#   ansible-playbook playbooks/fix-argocd-network-policies.yaml \
#     -e argocd_context=otcinfra2
#
- name: "Fix ArgoCD NetworkPolicy deadlock (argocd-k8s)"
  hosts: "k8s-controller:!disabled"
  gather_facts: false
  vars:
    # kubeconfig context of the cluster hosting ArgoCD
    argocd_context: otcinfra2
    # namespace ArgoCD is installed in
    argocd_namespace: argocd-k8s
    # value of the app.kubernetes.io/instance label on ArgoCD resources
    argocd_instance: argocd-otcinfra2
    # wait for Applications to leave sync=Unknown after the fix
    argocd_wait_for_recovery: true
  tasks:
    - name: "List chart-managed ArgoCD NetworkPolicies"
      kubernetes.core.k8s_info:
        context: "{{ argocd_context }}"
        api_version: networking.k8s.io/v1
        kind: NetworkPolicy
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - "app.kubernetes.io/instance={{ argocd_instance }}"
      register: _argocd_netpols

    - name: "Delete ArgoCD NetworkPolicies (unblock controller egress)"
      kubernetes.core.k8s:
        context: "{{ argocd_context }}"
        state: absent
        api_version: networking.k8s.io/v1
        kind: NetworkPolicy
        namespace: "{{ argocd_namespace }}"
        name: "{{ item.metadata.name }}"
      loop: "{{ _argocd_netpols.resources }}"
      loop_control:
        label: "{{ item.metadata.name }}"

    - name: "List argocd-server pods"
      kubernetes.core.k8s_info:
        context: "{{ argocd_context }}"
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=argocd-server"
      register: _argocd_pods

    - name: "Delete stale (non-Running) argocd-server pods"
      kubernetes.core.k8s:
        context: "{{ argocd_context }}"
        state: absent
        kind: Pod
        namespace: "{{ argocd_namespace }}"
        name: "{{ item.metadata.name }}"
      loop: >-
        {{ _argocd_pods.resources
           | rejectattr('status.phase', 'equalto', 'Running')
           | list }}
      loop_control:
        label: "{{ item.metadata.name }} ({{ item.status.phase }})"

    - name: "Wait for Applications to leave sync=Unknown"
      when: argocd_wait_for_recovery | bool
      kubernetes.core.k8s_info:
        context: "{{ argocd_context }}"
        api_version: argoproj.io/v1alpha1
        kind: Application
        namespace: "{{ argocd_namespace }}"
      register: _argocd_apps
      until: >-
        (_argocd_apps.resources
          | selectattr('status.sync.status', 'defined')
          | selectattr('status.sync.status', 'equalto', 'Unknown')
          | list | length) == 0
      retries: 20
      delay: 15
